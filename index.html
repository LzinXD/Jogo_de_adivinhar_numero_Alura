<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O JOGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="conteudo_geral">
        <img src="./assets/img/3T.png" alt="3t">
        <div>
            <h1>Bem-vindo ao O JOGO</h1>
        </div>
        <div class="container__texto">
            <h1>Descubra o número secreto e ganhe AURA</h1>
            <p class="texto__paragrafo">Digite um número entre 1 e 67 e clique em Chutar.</p>
        </div>
        <input type="number" min="1" max="50" placeholder="Digite um número" class="container__input">
        <div class="chute container__botoes">
            <button onclick="verificarChute()" class="container__botao">Chutar</button>
            <button onclick="" id="reiniciar" class="container__botao" disabled>Novo jogo</button>
        </div>
    </section>

    <script src="script.js" defer></script>
</body>
</html>
